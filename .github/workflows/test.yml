name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on ${{ matrix.os }} - Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    env:
      CMAKE_GENERATOR: Ninja
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: >
          sudo apt-get update &&
          sudo apt-get install -y ninja-build pkg-config protobuf-compiler
          libprotobuf-dev libre2-dev zlib1g-dev libzstd-dev

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja pkgconf protobuf re2 abseil zstd

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: python -m pip install ninja

      - name: Install build and test tools
        run: python -m pip install build pytest

      - name: Build wheel (Unix)
        if: runner.os != 'Windows'
        env:
          BLOATY_WHEEL_PREFER_SYSTEM_DEPS: "ON"
        run: python -m build --wheel

      - name: Build wheel (Windows)
        if: runner.os == 'Windows'
        run: python -m build --wheel

      - name: Install wheel
        run: >
          python -c "import glob, subprocess, sys;
          wheels = glob.glob('dist/*.whl');
          assert len(wheels) == 1, wheels;
          subprocess.check_call([sys.executable, '-m', 'pip', 'install', wheels[0]])"

      - name: Run tests
        env:
          DYLD_FALLBACK_LIBRARY_PATH: /opt/homebrew/lib:/usr/local/lib
          DYLD_LIBRARY_PATH: /opt/homebrew/lib:/usr/local/lib
        run: python -m pytest tests/ -v

  lint:
    name: Lint and format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          pip install ruff mypy

      - name: Run ruff
        run: ruff check src/ tests/

      - name: Run mypy
        run: mypy src/bloaty/ --ignore-missing-imports
